     because this app uses onclick="" attributes throughout; a stricter policy (nonces) would

<style>
:root{
  --bg:#0b0f14; --bg2:#11161d; --card:#151b23; --card2:#1a212b;
  --border:#232b36; --text:#eef2f6; --sub:#8b96a3; --accent:#2ee6a6;
  --accent2:#1fb886; --green:#2ee6a6; --yellow:#f2c94c; --red:#ff5c5c;
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,Roboto,Segoe UI,Inter,sans-serif;
  min-height:100vh;padding-bottom:96px;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}
.hidden{display:none !important}

/* ===== TOP BAR ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px;}
.brand{font-weight:700;font-size:18px;letter-spacing:.2px}
.brand span{color:var(--accent)}
.privacy-pill{font-size:11px;color:var(--sub);border:1px solid var(--border);padding:5px 10px;border-radius:20px;display:flex;gap:6px;align-items:center}

/* ===== SOCIAL ROW ===== */
.social-row{display:flex;gap:10px;justify-content:center;padding:2px 16px 12px}
.social-ico{width:34px;height:34px;border-radius:50%;background:var(--card2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text);text-decoration:none}
.social-ico svg{width:16px;height:16px}

/* ===== AD SLOT ===== */
.ad-slot-wrap{margin-bottom:10px}
.ad-label{font-size:10px;color:var(--sub);text-align:center;margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.ad-slot{min-height:0}

/* ===== ZOOM CONTROL ===== */
.zoom-control{position:absolute;left:8%;right:8%;bottom:5%;display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,.5);border-radius:20px;padding:6px 12px;z-index:5}
.zoom-control input[type=range]{flex:1;accent-color:var(--green)}
.zoom-icon{color:#fff;font-size:14px;width:12px;text-align:center;flex-shrink:0}
.icon-btn.active{background:var(--green);border-color:var(--green);color:#04241a}
.nfc-btn{display:flex;align-items:center;gap:8px;justify-content:center;margin:16px auto 0;max-width:220px;
  background:var(--card2);border:1px solid var(--border);border-radius:20px;color:var(--text);
  padding:10px 18px;font-size:13px;font-weight:600}
.nfc-btn.active{background:var(--green);border-color:var(--green);color:#04241a}

/* ===== SCAN VIEW ===== */
.scan-wrap{position:relative;padding:10px 14px 0}
.scan-title{text-align:center;color:var(--sub);font-size:13px;margin-bottom:14px;padding:0 10px}

.camera-frame{position:relative;width:100%;max-width:420px;margin:0 auto;aspect-ratio:1/1.05;border-radius:20px;overflow:hidden;background:#000;}
#reader{width:100%;height:100%;}
#reader video{width:100% !important;height:100% !important;object-fit:cover;}
.scan-corners{position:absolute;inset:0;pointer-events:none}
.corner{position:absolute;width:34px;height:34px;border:4px solid var(--green);border-radius:6px}
.corner.tl{top:8%;left:6%;border-right:none;border-bottom:none}
.corner.tr{top:8%;right:6%;border-left:none;border-bottom:none}
.corner.bl{bottom:8%;left:6%;border-right:none;border-top:none}
.corner.br{bottom:8%;right:6%;border-left:none;border-top:none}
.scan-line{position:absolute;left:6%;right:6%;top:45%;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);animation:sweep 2.2s ease-in-out infinite}
@keyframes sweep{0%,100%{top:12%}50%{top:82%}}

.scan-controls{display:flex;align-items:center;justify-content:space-between;max-width:420px;margin:14px auto 0;padding:0 10px}
.side-btns{display:flex;gap:10px}
.icon-btn{width:52px;height:52px;border-radius:50%;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text)}
.shutter{width:66px;height:66px;border-radius:50%;background:var(--green);border:none;display:flex;align-items:center;justify-content:center}
.shutter svg{width:26px;height:26px}

/* ===== BOTTOM NAV ===== */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:rgba(17,22,29,.97);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 4px 14px;z-index:50}
.navitem{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--sub);font-size:11px;flex:1}
.navitem.active{color:var(--green)}
.navitem svg{width:22px;height:22px}

/* ===== RESULT SHEET ===== */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;display:flex;align-items:flex-end}
.sheet{background:var(--bg2);width:100%;max-height:88vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:20px 18px 26px;
  animation:slideup .25s ease-out}
@keyframes slideup{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sheet-head h2{margin:0;font-size:22px}
.close-x{background:none;border:none;color:var(--sub);font-size:22px}

.type-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.type-icon{width:46px;height:46px;border-radius:12px;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--green);flex-shrink:0}
.type-icon svg{width:22px;height:22px}
.type-label{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.type-domain{font-size:19px;font-weight:700;word-break:break-all}

.mono-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;font-family:JetBrains Mono,monospace;
  font-size:13px;color:var(--green);word-break:break-all;line-height:1.5;margin-bottom:16px}

.meta-row{display:flex;justify-content:space-between;padding:12px 2px;border-bottom:1px solid var(--border);font-size:14px}
.meta-row:last-of-type{border-bottom:none}
.meta-row span:first-child{color:var(--sub)}

.risk-btn{width:100%;margin:16px 0;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--green),var(--accent2));
  color:#04241a;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px}

.risk-panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin:12px 0;text-align:center}
.gauge{width:140px;height:140px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;position:relative}
.gauge-inner{width:106px;height:106px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-inner b{font-size:26px}
.gauge-inner span{font-size:11px;color:var(--sub)}
.risk-verdict{font-weight:700;font-size:17px;margin-bottom:6px}
.risk-reasons{text-align:left;font-size:13px;color:var(--sub);margin-top:10px;line-height:1.6}
.risk-reasons li{margin-bottom:4px}

.action-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px}
.action-btn{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 4px;display:flex;flex-direction:column;
  align-items:center;gap:6px;color:var(--text);font-size:11px}
.action-btn svg{width:20px;height:20px;color:var(--green)}

/* ===== GENERATE VIEW ===== */
.gen-wrap{padding:16px}
.gen-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.gen-tile{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 12px;display:flex;flex-direction:column;
  align-items:flex-start;gap:8px;color:var(--text)}
.gen-tile.active{border-color:var(--green);background:var(--card2)}
.gen-tile svg{width:22px;height:22px;color:var(--green)}
.gen-tile b{font-size:14px}
.gen-tile small{color:var(--sub);font-size:11px}

.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--sub);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px;color:var(--text);font-size:14px}
.field textarea{min-height:80px;resize:vertical}

.platform-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:10px 12px;margin-bottom:8px}
.platform-row svg{width:20px;height:20px;flex-shrink:0}
.platform-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--green)}
.platform-row input[type=text]{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;
  color:var(--text);font-size:13px}

.primary-btn{width:100%;padding:15px;border-radius:14px;border:none;background:var(--green);color:#04241a;font-weight:700;
  font-size:15px;margin-top:8px}
.secondary-btn{width:100%;padding:14px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);
  font-weight:600;font-size:14px;margin-top:10px}

.qr-preview{background:#fff;border-radius:16px;padding:20px;display:flex;align-items:center;justify-content:center;margin:16px 0}
.hint{font-size:12px;color:var(--sub);line-height:1.6;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-top:10px}
.hint b{color:var(--text)}

.placeholder-view{padding:60px 24px;text-align:center;color:var(--sub)}
.placeholder-view svg{width:48px;height:48px;color:var(--border);margin-bottom:14px}

/* ===== SETTINGS ===== */
.settings-block{padding-top:6px}
.settings-title{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.seg-control{display:flex;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px;gap:4px}
.seg-btn{flex:1;padding:10px;border:none;background:transparent;border-radius:9px;color:var(--sub);font-weight:600;font-size:13px}
.seg-btn.active{background:var(--green);color:#04241a}
.accent-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.accent-swatch{width:32px;height:32px;border-radius:50%;border:2px solid transparent;padding:0}
.accent-swatch.active{border-color:var(--text)}
#customAccent{width:32px;height:32px;border-radius:50%;border:none;padding:0;background:none;overflow:hidden}

/* ===== LIGHT THEME ===== */
body.theme-light{
  --bg:#f5f7fa; --bg2:#eef1f5; --card:#ffffff; --card2:#f0f3f7;
  --border:#dde3ea; --text:#0b0f14; --sub:#5b6572;
}
body.theme-light .bottomnav{background:rgba(255,255,255,.97)}
body.theme-light .install{color:#04241a}

/* ===== FRAME OPTIONS / STUDIO PREVIEW ===== */
.frame-options{display:flex;flex-direction:column;gap:8px}
.frame-opt{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;font-size:14px;color:var(--text)}
.frame-opt input{width:18px;height:18px;accent-color:var(--green)}
.studio-label{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 10px}
.studio-wrap{display:flex;justify-content:center;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
#studioCanvas{max-width:100%;border-radius:10px}
</style>
</head>

<div id="resultOverlay" class="sheet-overlay hidden">
  <div class="sheet">
    <div class="sheet-head">

      <button class="close-x" id="closeResult">✕</button>

    </div>

<script>
/* ============================================================
   NAVIGATION
============================================================ */
const views = ['scan','generate','settings'];
document.querySelectorAll('.navitem').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const v = btn.dataset.view;
    views.forEach(x=>document.getElementById('view-'+x).classList.toggle('hidden', x!==v));
    document.querySelectorAll('.navitem').forEach(b=>b.classList.toggle('active', b===btn));
    if(v==='scan') startScanner(); else stopScanner();
  });
});

/* ============================================================
   SCANNER
============================================================ */
let html5QrCode, scanning=false, currentCamera='environment', torchOn=false;
function startScanner(){
  if(scanning) return;
  html5QrCode = new Html5Qrcode("reader");
  Html5Qrcode.getCameras().then(cams=>{
    if(!cams || !cams.length) return;
    html5QrCode.start(
      {facingMode: currentCamera},
      {fps:10, qrbox:{width:230,height:230}},
      (decodedText, decodedResult)=>{ onScanSuccess(decodedText, decodedResult); },
      ()=>{}
    ).then(()=>{ scanning=true; setupZoomControl(); }).catch(()=>{});
  }).catch(()=>{});
}
function stopScanner(){
  if(html5QrCode && scanning){
    html5QrCode.stop().then(()=>{scanning=false;}).catch(()=>{scanning=false;});
  }
  torchOn=false;
  document.getElementById('flashBtn').classList.remove('active');
  document.getElementById('zoomControl').classList.add('hidden');
}
document.getElementById('flipBtn').addEventListener('click',()=>{
  currentCamera = currentCamera==='environment' ? 'user' : 'environment';
  stopScanner(); setTimeout(startScanner,300);
});
document.getElementById('flashBtn').addEventListener('click',()=>{
  if(!(html5QrCode && scanning)) return;
  const next = !torchOn;
  html5QrCode.applyVideoConstraints({advanced:[{torch:next}]}).then(()=>{
    torchOn = next;
    document.getElementById('flashBtn').classList.toggle('active', torchOn);
  }).catch(()=>{ alert('Flash is not supported on this camera.'); });
});
document.getElementById('galleryBtn').addEventListener('click',()=>document.getElementById('galleryInput').click());
document.getElementById('galleryInput').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const tmp = new Html5Qrcode("reader");
  tmp.scanFile(file, true).then(text=>onScanSuccess(text)).catch(()=>alert('No QR code found in image.'));
});
document.getElementById('shutterBtn').addEventListener('click',()=>{
  // manual capture not needed with continuous scan; kept for UI parity
});

/* ---- Zoom: slider + pinch-to-zoom ---- */
function setupZoomControl(){
  const zoomCtrl = document.getElementById('zoomControl');
  const slider = document.getElementById('zoomSlider');
  try{
    const caps = html5QrCode.getRunningTrackCapabilities();
    if(caps && caps.zoom && caps.zoom.max > caps.zoom.min){
      slider.min = caps.zoom.min;
      slider.max = caps.zoom.max;
      slider.step = caps.zoom.step || 0.1;
      slider.value = caps.zoom.min;
      zoomCtrl.classList.remove('hidden');
    } else {
      zoomCtrl.classList.add('hidden');
    }
  }catch(e){
    zoomCtrl.classList.add('hidden');
  }
}
document.getElementById('zoomSlider').addEventListener('input', e=>{
  if(html5QrCode && scanning){
    html5QrCode.applyVideoConstraints({advanced:[{zoom: parseFloat(e.target.value)}]}).catch(()=>{});
  }
});
let pinchStartDist = null, pinchStartZoom = 1;
function touchDist(t){ const dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY; return Math.sqrt(dx*dx+dy*dy); }
const cameraFrameEl = document.querySelector('.camera-frame');
cameraFrameEl.addEventListener('touchstart', e=>{
  if(e.touches.length===2){
    pinchStartDist = touchDist(e.touches);
    pinchStartZoom = parseFloat(document.getElementById('zoomSlider').value) || 1;
  }
}, {passive:true});
cameraFrameEl.addEventListener('touchmove', e=>{
  if(e.touches.length===2 && pinchStartDist){
    e.preventDefault();
    const slider = document.getElementById('zoomSlider');
    const min = parseFloat(slider.min), max = parseFloat(slider.max);
    if(max>min){
      let z = pinchStartZoom * (touchDist(e.touches)/pinchStartDist);
      z = Math.min(max, Math.max(min, z));
      slider.value = z;
      if(html5QrCode && scanning) html5QrCode.applyVideoConstraints({advanced:[{zoom:z}]}).catch(()=>{});
    }
  }
}, {passive:false});
cameraFrameEl.addEventListener('touchend', e=>{ if(e.touches.length<2) pinchStartDist=null; });

window.addEventListener('load', startScanner);

/* ---- NFC (Web NFC API): only shown when supported — Chrome for Android, HTTPS ---- */
if('NDEFReader' in window){
  document.getElementById('nfcBtn').classList.remove('hidden');
}
document.getElementById('nfcBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('nfcBtn');
  try{
    const reader = new NDEFReader();
    await reader.scan();
    btn.classList.add('active');
    btn.lastChild.textContent = ' Waiting for NFC tag…';
    reader.onreading = (event)=>{
      const decoder = new TextDecoder();
      let text = '';
      for(const record of event.message.records){
        try{ text = decoder.decode(record.data); }catch(e){}
        if(text) break;
      }
      btn.classList.remove('active');
      btn.lastChild.textContent = ' Scan NFC Tag';
      if(text) onScanSuccess(text, {result:{format:{formatName:'NFC_TAG'}}});
    };
  }catch(e){
    btn.classList.remove('active');
    alert('NFC scan could not start. Make sure NFC is on and you\'re using Chrome for Android over HTTPS.');
  }
});

/* ============================================================
   RESULT SHEET
============================================================ */
let lastScanned = '';
function onScanSuccess(text, decodedResult){
  if(text === lastScanned) return; // avoid duplicate triggers
  lastScanned = text;
  stopScanner();
  let fmt = 'QR_CODE';
  try{ fmt = decodedResult.result.format.formatName || fmt; }catch(e){}
  showResult(text, fmt);
  setTimeout(()=>{ lastScanned=''; }, 1500);
}

function gtinCheckValid(digits){
  if(!/^\d+$/.test(digits) || digits.length<8) return null;
  const d = digits.slice(0,-1).split('').map(Number).reverse();
  const check = Number(digits.slice(-1));
  let sum = 0;
  d.forEach((n,i)=>{ sum += n * (i%2===0 ? 3 : 1); });
  return ((10 - (sum % 10)) % 10) === check;
}

const CRYPTO_SCHEMES = /^(bitcoin|ethereum|litecoin|dogecoin|bitcoincash|tron|ripple|monero|dash|cardano|solana):/i;

function classify(text){
  try{
    if(/^https?:\/\//i.test(text)){
      const u = new URL(text);
      return {type:'url', label:'LINK / URL', domain:u.hostname};
    }
  }catch(e){}
  if(/^WIFI:/i.test(text)) return {type:'wifi', label:'WI-FI NETWORK', domain:(text.match(/S:([^;]*)/)||[])[1]||'Network'};
  if(/^BEGIN:VCARD/i.test(text)) return {type:'vcard', label:'CONTACT CARD', domain:(text.match(/FN:([^\r\n]*)/i)||[])[1]||'vCard'};
  if(/^BEGIN:VEVENT|^BEGIN:VCALENDAR/i.test(text)) return {type:'event', label:'CALENDAR EVENT', domain:(text.match(/SUMMARY:([^\r\n]*)/i)||[])[1]||'Event'};
  if(/^mailto:/i.test(text)) return {type:'email', label:'EMAIL', domain:text.replace('mailto:','').split('?')[0]};
  if(/^tel:/i.test(text)) return {type:'tel', label:'PHONE NUMBER', domain:text.replace('tel:','')};
  if(/^(smsto:|sms:)/i.test(text)) return {type:'sms', label:'SMS MESSAGE', domain:text.replace(/^smsto:|^sms:/i,'').split(':')[0]};
  if(/^geo:/i.test(text)) return {type:'geo', label:'MAP LOCATION', domain:text.replace('geo:','').split('?')[0]};
  if(/^upi:\/\//i.test(text)){
    const payee = (text.match(/[?&]pa=([^&]+)/i)||[])[1];
    return {type:'upi', label:'UPI PAYMENT', domain: payee ? decodeURIComponent(payee) : 'Payment request'};
  }
  if(CRYPTO_SCHEMES.test(text)){
    const scheme = text.split(':')[0];
    return {type:'crypto', label:'CRYPTO PAYMENT ('+scheme.toUpperCase()+')', domain:text.split(':')[1].split('?')[0]};
  }
  if(/^\d{8}$|^\d{12,14}$/.test(text)){
    const fmtName = {8:'EAN-8',12:'UPC-A',13:'EAN-13',14:'GTIN-14'}[text.length] || 'Barcode';
    const valid = gtinCheckValid(text);
    return {type:'barcode', label:'PRODUCT BARCODE ('+fmtName+')', domain: valid===null ? text : (valid ? 'Checksum valid ✓' : 'Checksum invalid ⚠')};
  }
  if(/^data:text\/html/i.test(text)) return {type:'datahtml', label:'EMBEDDED WEB PAGE', domain:'Content is embedded directly in the QR (data: URI)'};
  if(/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(text) && !/^https?:\/\//i.test(text)){
    const scheme = text.split(':')[0];
    return {type:'applink', label:'APP DEEP LINK ('+scheme+')', domain:text};
  }
  return {type:'text', label:'PLAIN TEXT', domain: text.length>40? text.slice(0,40)+'…' : text};
}

function showResult(text, fmt){
  const c = classify(text);
  document.getElementById('resultLabel').textContent = c.label;
  document.getElementById('resultDomain').textContent = c.domain;
  document.getElementById('resultFull').textContent = text;
  document.getElementById('resultFormat').textContent = fmt || 'QR_CODE';
  document.getElementById('resultTime').textContent = new Date().toLocaleTimeString();
  document.getElementById('riskPanel').classList.add('hidden');
  document.getElementById('resultOverlay').classList.remove('hidden');
  document.getElementById('resultOverlay').dataset.payload = text;
  document.getElementById('resultOverlay').dataset.type = c.type;
}
document.getElementById('closeResult').addEventListener('click',()=>{
  document.getElementById('resultOverlay').classList.add('hidden');
  startScanner();
});

document.getElementById('actCopy').addEventListener('click',()=>{
  navigator.clipboard.writeText(document.getElementById('resultOverlay').dataset.payload).then(()=>alert('Copied to clipboard'));
});
document.getElementById('actShare').addEventListener('click',()=>{
  const text = document.getElementById('resultOverlay').dataset.payload;
  if(navigator.share) navigator.share({text}).catch(()=>{});
  else alert('Sharing not supported on this browser');
});
document.getElementById('actOpen').addEventListener('click',()=>{
  const payload = document.getElementById('resultOverlay').dataset.payload;
  const OPENABLE = /^(https?:|tel:|mailto:|sms:|smsto:|geo:|upi:|data:text\/html)/i;
  if(OPENABLE.test(payload)) window.open(payload,'_blank','noopener,noreferrer');
  else alert('This content type cannot be opened directly.');
});
document.getElementById('actDownload').addEventListener('click',()=>{
  const payload = document.getElementById('resultOverlay').dataset.payload;
  const blob = new Blob([payload], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'qr-result.txt'; a.click();
});

/* ============================================================
   RISK ANALYSIS ENGINE (heuristic, fully offline)
============================================================ */
document.getElementById('riskBtn').addEventListener('click',()=>{
  const payload = document.getElementById('resultOverlay').dataset.payload;
  const type = document.getElementById('resultOverlay').dataset.type;
  const result = analyzeRisk(payload, type);
  renderRisk(result);
});

const SHORTENERS = ['bit.ly','tinyurl.com','t.co','goo.gl','ow.ly','is.gd','buff.ly','rebrand.ly','cutt.ly','shorturl.at'];
const SUSPICIOUS_TLDS = ['.zip','.mov','.xyz','.top','.tk','.gq','.ml','.cf','.click','.link'];

function analyzeRisk(text, type){
  let score = 0; const reasons = [];

  if(type !== 'url'){
    if(type==='wifi'){ score+=5; reasons.push('WiFi payload — verify the network name is one you recognise.'); }
    else if(type==='text'){ score+=5; reasons.push('Plain text payload — low inherent risk.'); }
    else if(type==='datahtml'){ score+=35; reasons.push('This QR embeds a full web page directly — it has no domain, so its origin cannot be verified before opening. Only trust this if you know exactly who generated the QR code.'); }
    else { score+=8; reasons.push('Non-link payload — review content before acting on it.'); }
    return {score, reasons, level: levelFor(score)};
  }

  let u;
  try{ u = new URL(text); }catch(e){ score=70; reasons.push('Malformed URL structure.'); return {score,reasons,level:levelFor(score)}; }

  if(u.protocol !== 'https:'){ score+=25; reasons.push('Not using HTTPS — traffic may be unencrypted.'); }
  if(/^\d{1,3}(\.\d{1,3}){3}$/.test(u.hostname)){ score+=30; reasons.push('Destination is a raw IP address, not a domain.'); }
  if(u.username || u.password || text.includes('@') && text.indexOf('@') < text.indexOf(u.hostname)){ score+=20; reasons.push('URL contains an "@" trick that can hide the real destination.'); }
  if(SHORTENERS.some(s=>u.hostname.includes(s))){ score+=25; reasons.push('Uses a link-shortening service, which hides the final destination.'); }
  if(SUSPICIOUS_TLDS.some(t=>u.hostname.endsWith(t))){ score+=20; reasons.push('Uses a top-level domain often associated with abuse ('+u.hostname.slice(u.hostname.lastIndexOf('.'))+').'); }
  if(u.hostname.startsWith('xn--') || u.hostname.includes('xn--')){ score+=25; reasons.push('Punycode/IDN domain — can visually impersonate a trusted brand.'); }
  const subdomainCount = u.hostname.split('.').length - 2;
  if(subdomainCount >= 3){ score+=15; reasons.push('Unusually many subdomains, a common cloaking technique.'); }
  if(/-/.test(u.hostname) && /(login|secure|verify|account|update|bank|paypal)/i.test(u.hostname)){ score+=20; reasons.push('Domain mimics security/login language often used in phishing.'); }
  if(text.length > 150){ score+=10; reasons.push('Very long URL with many parameters — harder to verify.'); }
  if(u.hostname.split('.').pop().length > 4){ score+=5; reasons.push('Unusual top-level domain length.'); }

  score = Math.min(100, score);
  if(reasons.length===0) reasons.push('No obvious red flags detected in the URL structure.');
  return {score, reasons, level: levelFor(score)};
}
function levelFor(score){
  if(score < 30) return 'low';
  if(score < 60) return 'medium';
  return 'high';
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderRisk(r){
  const panel = document.getElementById('riskPanel');
  panel.classList.remove('hidden');
  document.getElementById('riskScore').textContent = r.score;
  const colors = {low:'var(--green)', medium:'var(--yellow)', high:'var(--red)'};
  const verdictText = {low:'Low Risk — looks safe', medium:'Medium Risk — proceed with caution', high:'High Risk — avoid opening'};
  document.getElementById('riskVerdict').textContent = verdictText[r.level];
  document.getElementById('riskVerdict').style.color = colors[r.level];
  document.getElementById('gauge').style.background =
    `conic-gradient(${colors[r.level]} ${r.score*3.6}deg, var(--border) 0deg)`;
  const ul = document.getElementById('riskReasons');
  ul.innerHTML = r.reasons.map(x=>`<li>${escapeHtml(x)}</li>`).join('');
}

   GENERATE VIEW
============================================================ */
const genTypes = [
  {id:'url', name:'Website / Link', icon:'M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1'},

      <div class="field" style="margin-top:14px"><label>Social Media Link</label><input id="inSocial" type="url" placeholder="Paste any social media URL, e.g. https://instagram.com/username"></div>
      <button class="primary-btn" onclick="genQR(document.getElementById('inSocial').value)">Generate QR Code</button>

      <div class="field" style="margin-top:14px"><label>Title (optional)</label><input id="msTitle" type="text" placeholder="e.g. Imtiyaz Surjapuri"></div>

      <div class="field"><label>Instagram</label><input id="msIg" type="url" placeholder="https://instagram.com/yourhandle"></div>
      <div class="field"><label>YouTube</label><input id="msYt" type="url" placeholder="https://youtube.com/@yourchannel"></div>
      <div class="field"><label>X (Twitter)</label><input id="msX" type="url" placeholder="https://x.com/yourhandle"></div>

  }
}

document.querySelector('.gen-tile').classList.add('active');

function genSocialMulti(){
  const title = document.getElementById('msTitle').value.trim() || 'My Links';
  const platforms = [
    {label:'Facebook',  val:document.getElementById('msFb').value.trim()},
    {label:'Instagram', val:document.getElementById('msIg').value.trim()},
    {label:'YouTube',   val:document.getElementById('msYt').value.trim()},
    {label:'X (Twitter)', val:document.getElementById('msX').value.trim()},
  ].filter(p=>p.val);
  if(platforms.length===0){ alert('Please fill in at least one link.'); return; }
  const esc = s => String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const links = platforms.map(p=>`<a href="${esc(p.val)}" target="_blank" rel="noopener">${esc(p.label)}</a>`).join('');
  const html = `<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>${esc(title)}</title><style>body{background:#0b0f14;color:#eef2f6;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;padding:44px 20px;gap:12px}h1{font-size:19px;margin:0 0 12px;text-align:center}a{width:100%;max-width:300px;text-decoration:none;color:#04241a;background:#2ee6a6;font-weight:700;text-align:center;padding:14px;border-radius:12px;box-sizing:border-box}</style><h1>${esc(title)}</h1>${links}`;
  const dataUri = 'data:text/html;charset=utf-8;base64,' + btoa(unescape(encodeURIComponent(html)));
  if(dataUri.length > 1800){
    if(!confirm("That's a lot of content — the QR code will be dense and may be harder for some cameras to scan. Continue anyway?")) return;
  }
  genQR(dataUri);
}

const QR_SIZE = 260;
function genQR(text){
  if(!text){ alert('Please fill in the required field.'); return; }
  const out = document.getElementById('qrOut');
  out.innerHTML = `
    <div class="qr-preview" id="qrBox" style="display:none"></div>
    <div class="field" style="margin-top:16px">
      <label>4. Wrap in Call-to-Action Frame</label>
      <div class="frame-options">
        <label class="frame-opt"><input type="radio" name="frameOpt" value="none" checked> No Frame (Just QR Code)</label>
        <label class="frame-opt"><input type="radio" name="frameOpt" value="border"> Border Outer Outline Frame</label>
        <label class="frame-opt"><input type="radio" name="frameOpt" value="banner"> "Scan Me" Bottom Tag Banner</label>
      </div>
    </div>
    <div class="studio-label">Live Studio Preview</div>
    <div class="studio-wrap"><canvas id="studioCanvas"></canvas></div>
    <button class="secondary-btn" id="dlQr">Download PNG</button>`;
  new QRCode(document.getElementById('qrBox'), {text, width:QR_SIZE, height:QR_SIZE, colorDark:'#0b0f14', colorLight:'#ffffff'});
  // qrcodejs paints synchronously to a canvas, but give it one tick to be safe
  setTimeout(renderStudioPreview, 30);
  document.querySelectorAll('input[name="frameOpt"]').forEach(r=>r.addEventListener('change', renderStudioPreview));
  document.getElementById('dlQr').addEventListener('click', downloadStudioPNG);
}

function getQRSourceEl(){
  return document.querySelector('#qrBox canvas') || document.querySelector('#qrBox img');
}

function renderStudioPreview(){
  const src = getQRSourceEl();
  const canvas = document.getElementById('studioCanvas');
  if(!src || !canvas) return;
  const frame = (document.querySelector('input[name="frameOpt"]:checked')||{}).value || 'none';
  let W, H, qy;
  if(frame==='border'){ W=QR_SIZE+64; H=QR_SIZE+64; }
  else if(frame==='banner'){ W=QR_SIZE+40; H=QR_SIZE+110; }
  else { W=QR_SIZE+40; H=QR_SIZE+40; }
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,W,H);
  const qx = (W-QR_SIZE)/2;
  qy = frame==='banner' ? 20 : (H-QR_SIZE)/2;
  if(frame==='border'){
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--green').trim() || '#2ee6a6';
    ctx.lineWidth = 8;
    ctx.strokeRect(12,12,W-24,H-24);
  }
  ctx.drawImage(src, qx, qy, QR_SIZE, QR_SIZE);
  if(frame==='banner'){
    const accent = getComputedStyle(document.documentElement).getPropertyValue('--green').trim() || '#2ee6a6';
    ctx.fillStyle = accent;
    ctx.fillRect(0, H-70, W, 70);
    ctx.fillStyle = '#04241a';
    ctx.font = 'bold 26px -apple-system, Roboto, Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('SCAN ME', W/2, H-35);
  }
}

function downloadStudioPNG(){
  const canvas = document.getElementById('studioCanvas');
  if(!canvas){ return; }
  canvas.toBlob(blob=>{
    if(!blob){ alert('Could not generate the image. Please try again.'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'qrcode.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
  }, 'image/png');
}
function genWifi(){
  const ssid=document.getElementById('inSsid').value, pass=document.getElementById('inPass').value, sec=document.getElementById('inSec').value;
  genQR(`WIFI:T:${sec};S:${ssid};P:${pass};;`);
}
function genVcard(){
  const n=document.getElementById('inName').value, p=document.getElementById('inPhone').value,
        e=document.getElementById('inEmail').value, o=document.getElementById('inOrg').value;
  genQR(`BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nORG:${o}\nTEL:${p}\nEMAIL:${e}\nEND:VCARD`);
}

/* ============================================================
   SETTINGS — THEME MODE + ACCENT COLOR
============================================================ */
function applyAccent(color){
  document.documentElement.style.setProperty('--accent', color);
  document.documentElement.style.setProperty('--accent2', color);
  document.documentElement.style.setProperty('--green', color);
  localStorage.setItem('qrverify_accent', color);
  document.querySelectorAll('.accent-swatch').forEach(b=>b.classList.toggle('active', b.dataset.accent===color));
  const customInput = document.getElementById('customAccent');
  if(customInput) customInput.value = color;
  renderStudioPreview();
}
function applyMode(mode){
  document.body.classList.toggle('theme-light', mode==='light');
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active', b.dataset.mode===mode));
  localStorage.setItem('qrverify_mode', mode);
}
document.querySelectorAll('.seg-btn').forEach(b=>b.addEventListener('click',()=>applyMode(b.dataset.mode)));
document.querySelectorAll('.accent-swatch').forEach(b=>b.addEventListener('click',()=>applyAccent(b.dataset.accent)));
const customAccentInput = document.getElementById('customAccent');
if(customAccentInput) customAccentInput.addEventListener('input', e=>applyAccent(e.target.value));

(function initTheme(){
  const mode = localStorage.getItem('qrverify_mode') || 'dark';
  const accent = localStorage.getItem('qrverify_accent') || '#2ee6a6';
  applyMode(mode);
  applyAccent(accent);
})();
</script>
